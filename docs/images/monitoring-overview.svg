<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#0f172a"/>
  <rect x="20" y="20" width="1160" height="55" rx="8" fill="#1e293b"/>
  <text x="40" y="55" font-family="Arial, sans-serif" font-size="22" fill="#e2e8f0">Zabbix Monitoring - Hosts Overview (example)</text>

  <rect x="20" y="95" width="1160" height="45" rx="6" fill="#334155"/>
  <text x="40" y="124" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">Name</text>
  <text x="330" y="124" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">Availability</text>
  <text x="520" y="124" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">Latest data</text>
  <text x="760" y="124" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">Problems</text>
  <text x="950" y="124" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">Status</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0">
    <rect x="20" y="150" width="1160" height="70" fill="#0b1220"/>
    <text x="40" y="192">machine-1</text>
    <rect x="320" y="170" width="70" height="28" rx="6" fill="#16a34a"/>
    <text x="340" y="189" fill="#ffffff">ZBX</text>
    <text x="520" y="192">CPU, RAM, Uptime</text>
    <text x="760" y="192">0</text>
    <text x="950" y="192" fill="#22c55e">Enabled</text>

    <rect x="20" y="225" width="1160" height="70" fill="#111827"/>
    <text x="40" y="267">machine-2</text>
    <rect x="320" y="245" width="70" height="28" rx="6" fill="#16a34a"/>
    <text x="340" y="264" fill="#ffffff">ZBX</text>
    <text x="520" y="267">CPU, RAM, Uptime</text>
    <text x="760" y="267">0</text>
    <text x="950" y="267" fill="#22c55e">Enabled</text>

    <rect x="20" y="300" width="1160" height="70" fill="#0b1220"/>
    <text x="40" y="342">machine-3</text>
    <rect x="320" y="320" width="70" height="28" rx="6" fill="#16a34a"/>
    <text x="340" y="339" fill="#ffffff">ZBX</text>
    <text x="520" y="342">CPU, RAM, Uptime</text>
    <text x="760" y="342">0</text>
    <text x="950" y="342" fill="#22c55e">Enabled</text>
  </g>

  <text x="20" y="420" font-family="Arial, sans-serif" font-size="18" fill="#93c5fd">Visual cible pour le README (capture monitoring)</text>
  <text x="20" y="450" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Remplace ce fichier par une vraie capture d'ecran Zabbix si necessaire.</text>
</svg>
