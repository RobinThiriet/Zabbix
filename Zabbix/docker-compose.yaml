services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbixpass}
    volumes:
      - zbx_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-latest
    depends_on:
      - postgres
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbixpass}
    ports:
      - "${ZABBIX_SERVER_PORT:-10051}:10051"
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-latest
    depends_on:
      - postgres
      - zabbix-server
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbixpass}
      ZBX_SERVER_HOST: ${ZBX_SERVER_HOST:-zabbix-server}
      PHP_TZ: ${PHP_TZ:-Europe/Paris}
    ports:
      - "${ZABBIX_WEB_PORT:-8080}:8080"
    restart: unless-stopped

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-latest
    depends_on:
      - zabbix-server
    environment:
      ZBX_SERVER_HOST: ${ZBX_SERVER_HOST:-zabbix-server}
      ZBX_HOSTNAME: ${ZBX_LOCAL_AGENT_HOSTNAME:-Zabbix server}
    ports:
      - "${ZABBIX_AGENT_PORT:-10050}:10050"
    restart: unless-stopped

volumes:
  zbx_pg_data:
