services:
  order_service:
    build:
      context: ./microservice_order
      dockerfile: Dockerfile
    ports:
      - "${ORDER_SERVICE_PORT:-5001}:5000"
    restart: unless-stopped

  product_service:
    build:
      context: ./microservice_product
      dockerfile: Dockerfile
    ports:
      - "${PRODUCT_SERVICE_PORT:-5002}:5000"
    restart: unless-stopped

  user_service:
    build:
      context: ./microservice_user
      dockerfile: Dockerfile
    ports:
      - "${USER_SERVICE_PORT:-5003}:5000"
    restart: unless-stopped
